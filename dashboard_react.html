<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe24 데이터 분석 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    body { background-color: #F5F5F5; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Tailwind CDN doesn't generate opacity variants for custom colors */
    .section-bg-blue   { background-color: #2563EB; }
    .section-bg-green  { background-color: #059669; }
    .section-bg-purple { background-color: #7C3AED; }
    .section-bg-orange { background-color: #EA580C; }
    .section-bg-indigo { background-color: #4F46E5; }
    .section-bg-teal   { background-color: #0D9488; }
    .section-bg-gray   { background-color: #374151; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState } = React;
    const {
      LineChart, Line, BarChart, Bar, ComposedChart,
      PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
    } = Recharts;

    // ============================================================
    // SAMPLE DATA (Phase 1 하드코딩 — 추후 API 연동)
    // ============================================================
    const KPI = {
      revenue: 3078517000,  revenueYoY: 0.0,
      orders: 83985,        ordersYoY: 0.0,
      aov: 36655,           aovYoY: 0.0,
      newRevenuePct: 96.9,  newRevenuePctYoY: 0.0,
      newCustomers: 68694,  newCustomersYoY: 0.0,
      retentionRate: 1.5,   retentionYoY: 0.0,
      avgFrequency: 1.2,    avgFrequencyYoY: 0.0,
      ltv90: 43438,         ltv90YoY: 0.0,
      repurchase: { d30: 36.1, d60: 52.2, d90: 61.3, d120: 70.0 },
    };

    const SALES_TREND = [
      { month:'1월',  revenue:245000000, orders:6700,  prevRevenue:240000000 },
      { month:'2월',  revenue:268000000, orders:7200,  prevRevenue:255000000 },
      { month:'3월',  revenue:312000000, orders:8500,  prevRevenue:298000000 },
      { month:'4월',  revenue:285000000, orders:7800,  prevRevenue:275000000 },
      { month:'5월',  revenue:298000000, orders:8100,  prevRevenue:285000000 },
      { month:'6월',  revenue:225000000, orders:6100,  prevRevenue:218000000 },
      { month:'7월',  revenue:195000000, orders:5300,  prevRevenue:190000000 },
      { month:'8월',  revenue:210000000, orders:5700,  prevRevenue:205000000 },
      { month:'9월',  revenue:265000000, orders:7200,  prevRevenue:258000000 },
      { month:'10월', revenue:302000000, orders:8200,  prevRevenue:295000000 },
      { month:'11월', revenue:345000000, orders:9400,  prevRevenue:335000000 },
      { month:'12월', revenue:328000000, orders:8900,  prevRevenue:322000000 },
    ];

    const CUSTOMER_TREND = [
      { month:'1월',  new:5200, returning:800,  dormant:200, pct:12.9 },
      { month:'2월',  new:5600, returning:920,  dormant:220, pct:13.8 },
      { month:'3월',  new:6800, returning:1050, dormant:280, pct:13.2 },
      { month:'4월',  new:6100, returning:980,  dormant:260, pct:13.6 },
      { month:'5월',  new:6400, returning:1020, dormant:250, pct:13.5 },
      { month:'6월',  new:4800, returning:760,  dormant:190, pct:13.4 },
      { month:'7월',  new:4200, returning:680,  dormant:160, pct:13.8 },
      { month:'8월',  new:4500, returning:720,  dormant:180, pct:13.5 },
      { month:'9월',  new:5700, returning:910,  dormant:230, pct:13.6 },
      { month:'10월', new:6500, returning:1040, dormant:260, pct:13.6 },
      { month:'11월', new:7400, returning:1200, dormant:300, pct:13.8 },
      { month:'12월', new:7100, returning:1140, dormant:290, pct:13.6 },
    ];

    const FUNNEL = {
      visitors: 150000, productViews: 85000,
      addToCart: 12500, checkoutStart: 8200, purchased: 6500,
    };

    const COMPOSITION = [
      { name:'신규 고객',  value:68694, color:'#3B82F6' },
      { name:'재구매 고객', value:12543, color:'#10B981' },
      { name:'휴면복귀',   value:3210,  color:'#F59E0B' },
      { name:'휴면',       value:45000, color:'#9CA3AF' },
    ];

    const MEMBER_RATIO = [
      { type:'회원 구매',   value:75 },
      { type:'비회원 구매', value:25 },
    ];

    const TOP_REVENUE = [
      { rank:1, name:'고등어밥상 오렌지라벨 순살 가시 뼈없는 노르웨이…', revenue:185000000, pct:6.0 },
      { rank:2, name:'고등어밥상 핑크라벨 800g 노르웨이 고등어 가시…',  revenue:162000000, pct:5.3 },
      { rank:3, name:'가시제거연구소 삼치밥상 800g 대삼치…',            revenue:145000000, pct:4.7 },
      { rank:4, name:'가시제거연구소 순살 가자미밥상 650g…',            revenue:138000000, pct:4.5 },
      { rank:5, name:'가시제거연구소 볼락밥상 650g 노르웨이…',          revenue:125000000, pct:4.1 },
    ];
    const TOP_ORDERS = [
      { rank:1, name:'고등어밥상 오렌지라벨',        orders:4521 },
      { rank:2, name:'고등어밥상 핑크라벨 800g',     orders:3987 },
      { rank:3, name:'가시제거연구소 고등어밥상 800g', orders:3456 },
      { rank:4, name:'가시제거연구소 삼치밥상 800g',  orders:3102 },
      { rank:5, name:'가시제거연구소 순살 가자미밥상', orders:2876 },
    ];
    const TOP_RETURNS = [
      { rank:1, name:'특선 조기구이',      returnRate:8.2 },
      { rank:2, name:'임연수어 반건조',    returnRate:6.5 },
      { rank:3, name:'갈치 염건 300g',    returnRate:5.8 },
    ];

    // ============================================================
    // UTILITIES
    // ============================================================
    function fmtCurrency(n) {
      if (n >= 100000000) return `₩${(n / 100000000).toFixed(1)}억`;
      if (n >= 10000) return `₩${Math.round(n / 10000).toLocaleString('ko-KR')}만`;
      return `₩${n.toLocaleString('ko-KR')}`;
    }

    function YoYBadge({ pct }) {
      if (pct === 0 || pct == null) return <span className="text-xs text-gray-400 ml-1">YoY -</span>;
      const pos = pct > 0;
      return (
        <span className={`text-xs ml-1 font-semibold ${pos ? 'text-emerald-500' : 'text-red-500'}`}>
          {pos ? '▲' : '▼'}{Math.abs(pct).toFixed(1)}%
        </span>
      );
    }

    // ============================================================
    // BASE UI COMPONENTS
    // ============================================================
    function SectionHeader({ title, icon, bgClass, subtitle, children }) {
      return (
        <div className={`${bgClass} px-5 py-3 rounded-t-xl flex items-center justify-between`}>
          <div className="flex items-start gap-2">
            <span className="text-xl mt-0.5">{icon}</span>
            <div>
              <h2 className="text-white font-bold text-base leading-tight">{title}</h2>
              {subtitle && <p className="text-white text-xs mt-0.5" style={{opacity:0.75}}>{subtitle}</p>}
            </div>
          </div>
          {children && <div>{children}</div>}
        </div>
      );
    }

    function KPICard({ label, value, yoy, accentColor }) {
      return (
        <div className="bg-white rounded-xl shadow-sm p-4 flex flex-col gap-1 min-w-0">
          <p className="text-xs text-gray-400 uppercase tracking-wide font-medium truncate">{label}</p>
          <div className="flex items-baseline flex-wrap gap-0.5">
            <p className="text-xl font-bold text-gray-900 leading-tight" style={accentColor ? {color: accentColor} : {}}>
              {value}
            </p>
            {yoy !== undefined && <YoYBadge pct={yoy} />}
          </div>
        </div>
      );
    }

    function DateFilterBar({ selected, onChange }) {
      const opts = [
        { label:'오늘', v:'1d' }, { label:'최근 7일', v:'7d' },
        { label:'최근 30일', v:'30d' }, { label:'최근 90일', v:'90d' },
        { label:'직접 설정', v:'custom' },
      ];
      return (
        <div className="flex gap-2 flex-wrap items-center">
          {opts.map(o => (
            <button key={o.v} onClick={() => onChange(o.v)}
              className={`px-3 py-1.5 rounded-full text-sm font-medium transition-all ${
                selected === o.v
                  ? 'bg-blue-500 text-white shadow'
                  : 'bg-white text-gray-600 border border-gray-200 hover:border-blue-300 hover:text-blue-600'
              }`}>
              {o.label}
            </button>
          ))}
        </div>
      );
    }

    const TABS = [
      { label:'📊 종합 분석 (Overview)', v:'overview' },
      { label:'👥 고객/RFM (Customer)',   v:'customer' },
      { label:'📦 상품/장바구니 (Product)', v:'product' },
      { label:'🗓 코호트 (Cohort)',        v:'cohort' },
      { label:'🔮 구매 패턴 (Pattern)',   v:'pattern' },
    ];

    function TabNav({ selected, onChange }) {
      return (
        <div className="flex overflow-x-auto scrollbar-hide border-b border-gray-200 bg-white">
          {TABS.map(t => (
            <button key={t.v} onClick={() => onChange(t.v)}
              className={`px-5 py-3.5 text-sm font-medium whitespace-nowrap transition-all border-b-2 ${
                selected === t.v
                  ? 'border-blue-500 text-blue-600'
                  : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'
              }`}>
              {t.label}
            </button>
          ))}
        </div>
      );
    }

    // ============================================================
    // CHART TOOLTIP
    // ============================================================
    function ChartTooltip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      const fmt = (p) => {
        const v = p.value;
        const n = p.name || '';
        if (n.includes('매출') || n.includes('revenue') || n === '전년 매출') return fmtCurrency(v);
        if (n.includes('%')) return `${v}%`;
        return v?.toLocaleString?.('ko-KR') ?? String(v);
      };
      return (
        <div className="bg-white border border-gray-100 rounded-xl shadow-lg p-3 text-xs">
          <p className="font-semibold text-gray-700 mb-1.5">{label}</p>
          {payload.map((p, i) => (
            <p key={i} style={{ color: p.color }} className="leading-5">{p.name}: {fmt(p)}</p>
          ))}
        </div>
      );
    }

    // ============================================================
    // CHART: SALES TREND (ComposedChart Dual Y-axis)
    // ============================================================
    function SalesTrendChart({ data }) {
      const [gran, setGran] = useState('월별');
      return (
        <div className="bg-white rounded-b-xl p-5">
          <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
            <div className="flex gap-1">
              {['일별','주별','월별'].map(g => (
                <button key={g} onClick={() => setGran(g)}
                  className={`px-3 py-1 text-xs rounded-full font-medium transition-all ${
                    gran === g ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:bg-gray-100'
                  }`}>
                  {g}
                </button>
              ))}
            </div>
            <div className="flex gap-4 text-xs text-gray-400 items-center">
              <span className="flex items-center gap-1.5">
                <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke="#3B82F6" strokeWidth="2.5"/></svg>
                금년 매출
              </span>
              <span className="flex items-center gap-1.5">
                <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke="#BFDBFE" strokeWidth="2" strokeDasharray="4 3"/></svg>
                전년 매출
              </span>
              <span className="flex items-center gap-1.5">
                <span style={{display:'inline-block',width:12,height:12,backgroundColor:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:2}}></span>
                주문수
              </span>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={300}>
            <ComposedChart data={data} margin={{ top:5, right:35, left:5, bottom:5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6" />
              <XAxis dataKey="month" tick={{ fontSize:11, fill:'#9CA3AF' }} />
              <YAxis yAxisId="rev" width={52}
                tickFormatter={v => `${(v/100000000).toFixed(0)}억`}
                tick={{ fontSize:10, fill:'#9CA3AF' }} />
              <YAxis yAxisId="ord" orientation="right" width={40}
                tickFormatter={v => `${(v/1000).toFixed(0)}천`}
                tick={{ fontSize:10, fill:'#9CA3AF' }} />
              <Tooltip content={<ChartTooltip />} />
              <Bar yAxisId="ord" dataKey="orders" name="주문수"
                fill="#EFF6FF" stroke="#BFDBFE" strokeWidth={1} radius={[3,3,0,0]} />
              <Line yAxisId="rev" type="monotone" dataKey="prevRevenue" name="전년 매출"
                stroke="#BFDBFE" strokeWidth={2} strokeDasharray="5 4" dot={false} />
              <Line yAxisId="rev" type="monotone" dataKey="revenue" name="매출"
                stroke="#3B82F6" strokeWidth={2.5} dot={{ r:3, fill:'#3B82F6' }} activeDot={{ r:5 }} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ============================================================
    // CHART: NEW vs RETURN CUSTOMER TREND (Stacked + Line)
    // ============================================================
    function NewVsReturnChart({ data }) {
      return (
        <div className="bg-white rounded-b-xl p-5">
          <ResponsiveContainer width="100%" height={280}>
            <ComposedChart data={data} margin={{ top:5, right:35, left:5, bottom:5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6" />
              <XAxis dataKey="month" tick={{ fontSize:11, fill:'#9CA3AF' }} />
              <YAxis yAxisId="cnt" width={45} tick={{ fontSize:10, fill:'#9CA3AF' }} />
              <YAxis yAxisId="pct" orientation="right" width={35}
                tickFormatter={v => `${v}%`} domain={[0, 25]}
                tick={{ fontSize:10, fill:'#9CA3AF' }} />
              <Tooltip content={<ChartTooltip />} />
              <Legend wrapperStyle={{ fontSize:12 }} />
              <Bar yAxisId="cnt" dataKey="new"       name="신규"    stackId="a" fill="#3B82F6" />
              <Bar yAxisId="cnt" dataKey="returning" name="재구매"  stackId="a" fill="#10B981" />
              <Bar yAxisId="cnt" dataKey="dormant"   name="휴면복귀" stackId="a" fill="#F59E0B" radius={[3,3,0,0]} />
              <Line yAxisId="pct" type="monotone" dataKey="pct" name="재구매비중%"
                stroke="#8B5CF6" strokeWidth={2.5} dot={{ r:3 }} activeDot={{ r:5 }} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ============================================================
    // CHART: CONVERSION FUNNEL (Custom CSS)
    // ============================================================
    function ConversionFunnel({ data }) {
      const stages = [
        { label:'방문자',   value:data.visitors,     c1:'#EFF6FF', c2:'#BFDBFE' },
        { label:'상품 조회', value:data.productViews, c1:'#DBEAFE', c2:'#93C5FD' },
        { label:'장바구니', value:data.addToCart,     c1:'#BFDBFE', c2:'#60A5FA' },
        { label:'결제 시작', value:data.checkoutStart, c1:'#93C5FD', c2:'#3B82F6' },
        { label:'결제 완료', value:data.purchased,     c1:'#3B82F6', c2:'#1D4ED8' },
      ];
      const maxV = stages[0].value;
      const cartCvr = (data.addToCart / data.productViews * 100).toFixed(1);
      const cartToPay = (data.purchased / data.checkoutStart * 100).toFixed(1);
      const totalCvr = (data.purchased / data.visitors * 100).toFixed(1);

      return (
        <div className="bg-white rounded-b-xl p-5">
          <div className="flex items-end gap-2 justify-center mb-6" style={{height:240}}>
            {stages.map((s, i) => {
              const h = Math.max((s.value / maxV) * 200, 24);
              const drop = i > 0
                ? ((stages[i-1].value - s.value) / stages[i-1].value * 100).toFixed(1)
                : null;
              return (
                <div key={s.label} className="flex flex-col items-center flex-1 min-w-0" style={{justifyContent:'flex-end'}}>
                  {drop && (
                    <p className="text-xs text-red-400 font-semibold mb-1">↓{drop}%</p>
                  )}
                  <div style={{
                    height: h, width:'100%',
                    background: `linear-gradient(to bottom, ${s.c1}, ${s.c2})`,
                    borderRadius: '6px 6px 0 0',
                    border: `1.5px solid ${s.c2}`,
                  }} />
                  <p className="text-xs text-gray-600 text-center mt-2 font-medium leading-tight px-1">{s.label}</p>
                  <p className="text-sm font-bold text-gray-800">{s.value.toLocaleString('ko-KR')}</p>
                </div>
              );
            })}
          </div>
          <div className="grid grid-cols-3 gap-3 pt-4 border-t border-gray-100">
            <div className="text-center bg-blue-50 rounded-xl py-3 px-2">
              <p className="text-xs text-gray-500 mb-1">조회→장바구니</p>
              <p className="text-2xl font-bold text-blue-600">{cartCvr}%</p>
            </div>
            <div className="text-center bg-purple-50 rounded-xl py-3 px-2">
              <p className="text-xs text-gray-500 mb-1">장바구니→결제</p>
              <p className="text-2xl font-bold text-purple-600">{cartToPay}%</p>
            </div>
            <div className="text-center bg-emerald-50 rounded-xl py-3 px-2">
              <p className="text-xs text-gray-500 mb-1">전체 전환율</p>
              <p className="text-2xl font-bold text-emerald-600">{totalCvr}%</p>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // CHART: CUSTOMER COMPOSITION (Donut + Bar)
    // ============================================================
    function CustomerCompositionChart() {
      const RADIAN = Math.PI / 180;
      const label = ({ cx, cy, midAngle, innerRadius, outerRadius, percent }) => {
        if (percent < 0.05) return null;
        const r = innerRadius + (outerRadius - innerRadius) * 0.5;
        return (
          <text x={cx + r * Math.cos(-midAngle * RADIAN)} y={cy + r * Math.sin(-midAngle * RADIAN)}
            fill="white" textAnchor="middle" dominantBaseline="central" fontSize={11} fontWeight="bold">
            {`${(percent * 100).toFixed(0)}%`}
          </text>
        );
      };
      return (
        <div className="bg-white rounded-b-xl p-5">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {/* Donut */}
            <div>
              <p className="text-sm font-semibold text-gray-600 text-center mb-2">고객 구성</p>
              <ResponsiveContainer width="100%" height={210}>
                <PieChart>
                  <Pie data={COMPOSITION} cx="50%" cy="50%" innerRadius={55} outerRadius={90}
                    dataKey="value" labelLine={false} label={label}>
                    {COMPOSITION.map((d, i) => <Cell key={i} fill={d.color} />)}
                  </Pie>
                  <Tooltip formatter={(v, n) => [`${v.toLocaleString('ko-KR')}명`, n]} />
                </PieChart>
              </ResponsiveContainer>
              <div className="flex flex-wrap gap-x-4 gap-y-1 justify-center">
                {COMPOSITION.map((d, i) => (
                  <div key={i} className="flex items-center gap-1 text-xs text-gray-500">
                    <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor:d.color }}></span>
                    {d.name}
                  </div>
                ))}
              </div>
            </div>
            {/* Horizontal Bar */}
            <div>
              <p className="text-sm font-semibold text-gray-600 text-center mb-4">회원 vs 비회원 구매</p>
              <div className="space-y-5 mt-6">
                {MEMBER_RATIO.map((d, i) => (
                  <div key={i}>
                    <div className="flex justify-between text-sm mb-1.5">
                      <span className="text-gray-600 font-medium">{d.type}</span>
                      <span className="font-bold text-gray-800">{d.value}%</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-5 overflow-hidden">
                      <div className="h-5 rounded-full transition-all"
                        style={{ width:`${d.value}%`, backgroundColor: i===0 ? '#3B82F6' : '#D1D5DB' }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION: SALES GROWTH BOARD
    // ============================================================
    function SalesGrowthBoard({ kpi }) {
      const cards = [
        { label:'총매출 REVENUE', value:`₩${(kpi.revenue/100000000).toFixed(0)}억`, yoy:kpi.revenueYoY },
        { label:'주문수 ORDERS',  value:`${kpi.orders.toLocaleString('ko-KR')}건`,  yoy:kpi.ordersYoY },
        { label:'객단가 AOV',     value:`₩${kpi.aov.toLocaleString('ko-KR')}`,      yoy:kpi.aovYoY },
        { label:'신규 매출 비중', value:`${kpi.newRevenuePct}%`,                     yoy:kpi.newRevenuePctYoY },
      ];
      return (
        <div className="rounded-xl overflow-hidden shadow-sm">
          <SectionHeader title="매출 성장 보드" icon="📈" bgClass="section-bg-blue" subtitle="Sales Growth · 전년 동기 대비" />
          <div className="bg-blue-50 p-4">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
              {cards.map(c => <KPICard key={c.label} {...c} />)}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION: CUSTOMER GROWTH BOARD
    // ============================================================
    function CustomerGrowthBoard({ kpi }) {
      const cards = [
        { label:'신규 고객수',        value:`${kpi.newCustomers.toLocaleString('ko-KR')}명`, yoy:kpi.newCustomersYoY },
        { label:'재구매율 RETENTION', value:`${kpi.retentionRate}%`,                         yoy:kpi.retentionYoY },
        { label:'평균 구매 횟수',     value:`${kpi.avgFrequency}회`,                          yoy:kpi.avgFrequencyYoY },
        { label:'90일 LTV',           value:`₩${kpi.ltv90.toLocaleString('ko-KR')}`,         yoy:kpi.ltv90YoY },
      ];
      return (
        <div className="rounded-xl overflow-hidden shadow-sm">
          <SectionHeader title="고객 성장 보드" icon="👥" bgClass="section-bg-green" subtitle="Customer Growth · 전년 동기 대비" />
          <div className="bg-emerald-50 p-4">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
              {cards.map(c => <KPICard key={c.label} {...c} />)}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION: REPURCHASE RATE BOARD
    // ============================================================
    function RepurchaseBoard({ kpi }) {
      const periods = [
        { label:'30일 재구매율',  value:kpi.repurchase.d30 },
        { label:'60일 재구매율',  value:kpi.repurchase.d60 },
        { label:'90일 재구매율',  value:kpi.repurchase.d90 },
        { label:'120일 재구매율', value:kpi.repurchase.d120 },
      ];
      return (
        <div className="rounded-xl overflow-hidden shadow-sm">
          <SectionHeader title="기간별 재구매율" icon="🔄" bgClass="section-bg-purple" subtitle="Repurchase Rate by Period · 첫 구매 후 N일 이내" />
          <div className="bg-violet-50 p-4">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
              {periods.map(p => (
                <KPICard key={p.label} label={p.label} value={`${p.value}%`} accentColor="#7C3AED" />
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION: PRODUCT SNAPSHOT
    // ============================================================
    function RankBadge({ rank }) {
      const cls = rank === 1 ? 'bg-yellow-400 text-white' : rank === 2 ? 'bg-gray-300 text-gray-700' : 'bg-gray-100 text-gray-500';
      return (
        <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${cls}`}>
          {rank}
        </span>
      );
    }

    function ProductSnapshot() {
      return (
        <div className="rounded-xl overflow-hidden shadow-sm">
          <SectionHeader title="상품 스냅샷 Top 5" icon="📦" bgClass="section-bg-orange" subtitle="Product Snapshot">
            <button className="text-xs border border-orange-300 text-orange-100 rounded-full px-3 py-1 hover:bg-orange-600 transition-colors">
              상품 탭 더보기 →
            </button>
          </SectionHeader>
          <div className="bg-orange-50 p-4">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {/* Revenue */}
              <div className="bg-white rounded-xl p-4 shadow-sm">
                <h3 className="text-sm font-bold text-gray-700 mb-3">💰 매출 Top 5</h3>
                <div className="space-y-2.5">
                  {TOP_REVENUE.map(p => (
                    <div key={p.rank} className="flex items-center gap-2">
                      <RankBadge rank={p.rank} />
                      <span className="flex-1 text-xs text-gray-700 truncate" title={p.name}>{p.name}</span>
                      <span className="text-xs font-bold text-gray-900 whitespace-nowrap">₩{(p.revenue/100000000).toFixed(1)}억</span>
                      <span className="text-xs text-gray-400 w-8 text-right">{p.pct}%</span>
                    </div>
                  ))}
                </div>
              </div>
              {/* Orders */}
              <div className="bg-white rounded-xl p-4 shadow-sm">
                <h3 className="text-sm font-bold text-gray-700 mb-3">📦 주문수 Top 5</h3>
                <div className="space-y-2.5">
                  {TOP_ORDERS.map(p => (
                    <div key={p.rank} className="flex items-center gap-2">
                      <RankBadge rank={p.rank} />
                      <span className="flex-1 text-xs text-gray-700 truncate" title={p.name}>{p.name}</span>
                      <span className="text-xs font-bold text-gray-900 whitespace-nowrap">{p.orders.toLocaleString('ko-KR')}건</span>
                    </div>
                  ))}
                </div>
              </div>
              {/* Returns */}
              <div className="bg-white rounded-xl p-4 shadow-sm">
                <h3 className="text-sm font-bold text-red-600 mb-3">⚠️ 반품률 Top 3</h3>
                <div className="space-y-2.5">
                  {TOP_RETURNS.map(p => (
                    <div key={p.rank} className="flex items-center gap-2">
                      <span className="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 bg-red-100 text-red-600">
                        {p.rank}
                      </span>
                      <span className="flex-1 text-xs text-gray-700 truncate" title={p.name}>{p.name}</span>
                      <span className="text-xs font-bold text-red-500 whitespace-nowrap">{p.returnRate}%</span>
                    </div>
                  ))}
                </div>
                <p className="text-xs text-gray-400 mt-3 pt-3 border-t border-gray-100">
                  반품률 높음 = 품질/배송 이슈 점검 필요
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION: INSIGHT BOX
    // ============================================================
    function InsightBox({ kpi }) {
      const insights = [];
      if (kpi.newRevenuePct > 90)
        insights.push({ type:'danger',   icon:'🚨', text:`신규 매출 비중이 ${kpi.newRevenuePct}%로, 재구매 매출이 거의 없습니다. 리텐션 캠페인이 시급합니다.` });
      if (kpi.repurchase.d30 > 30)
        insights.push({ type:'positive', icon:'📈', text:`30일 내 재구매율 ${kpi.repurchase.d30}%는 양호합니다. 이 고객들을 타겟으로 한 2차 구매 유도 전략을 검토하세요.` });
      if (kpi.avgFrequency < 1.5)
        insights.push({ type:'warn',     icon:'⚠️', text:`평균 구매 횟수 ${kpi.avgFrequency}회 — 대부분의 고객이 1회 구매 후 이탈하고 있습니다.` });
      if (kpi.retentionRate < 5)
        insights.push({ type:'danger',   icon:'🚨', text:`재구매율 ${kpi.retentionRate}%는 매우 낮습니다. 이탈 방지 이메일 캠페인 또는 적립금 지급 프로그램을 검토하세요.` });
      insights.push({ type:'info', icon:'💡', text:`120일 재구매율 ${kpi.repurchase.d120}%는 높은 편입니다. 장기 로열티 고객 비중이 꾸준히 유지되고 있습니다.` });

      const cls = {
        danger:   'bg-red-50 border border-red-200 text-red-800',
        warn:     'bg-yellow-50 border border-yellow-200 text-yellow-800',
        positive: 'bg-emerald-50 border border-emerald-200 text-emerald-800',
        info:     'bg-blue-50 border border-blue-200 text-blue-800',
      };
      return (
        <div className="rounded-xl overflow-hidden shadow-sm">
          <SectionHeader title="자동 인사이트" icon="💡" bgClass="section-bg-gray" subtitle="데이터 기반 자동 생성" />
          <div className="bg-gray-50 p-4 space-y-3">
            {insights.map((ins, i) => (
              <div key={i} className={`flex gap-3 p-4 rounded-xl ${cls[ins.type]}`}>
                <span className="text-xl flex-shrink-0">{ins.icon}</span>
                <p className="text-sm leading-relaxed">{ins.text}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================
    // TAB 1: OVERVIEW
    // ============================================================
    function OverviewTab() {
      return (
        <div className="space-y-5">
          <SalesGrowthBoard kpi={KPI} />
          <CustomerGrowthBoard kpi={KPI} />
          <RepurchaseBoard kpi={KPI} />
          <div className="rounded-xl overflow-hidden shadow-sm">
            <SectionHeader title="매출 트렌드" icon="📊" bgClass="section-bg-blue"
              subtitle="일별 / 주별 / 월별 토글 · 전년 동기 비교선(점선)" />
            <SalesTrendChart data={SALES_TREND} />
          </div>
          <div className="rounded-xl overflow-hidden shadow-sm">
            <SectionHeader title="신규 vs 재구매 고객 추이" icon="👥" bgClass="section-bg-green"
              subtitle="월별 고객 구성 스택 · 재구매 비중 라인(보라색)" />
            <NewVsReturnChart data={CUSTOMER_TREND} />
          </div>
          <div className="rounded-xl overflow-hidden shadow-sm">
            <SectionHeader title="구매 퍼널 (Conversion Funnel)" icon="🔽" bgClass="section-bg-indigo"
              subtitle="방문자 → 상품 조회 → 장바구니 → 결제 시작 → 결제 완료" />
            <ConversionFunnel data={FUNNEL} />
          </div>
          <div className="rounded-xl overflow-hidden shadow-sm">
            <SectionHeader title="고객 구성 스냅샷" icon="🎯" bgClass="section-bg-teal"
              subtitle="신규 · 재구매 · 휴면복귀 · 휴면 비율 / 회원 vs 비회원 구매" />
            <CustomerCompositionChart />
          </div>
          <ProductSnapshot />
          <InsightBox kpi={KPI} />
        </div>
      );
    }

    // ============================================================
    // COMING SOON STUBS
    // ============================================================
    function ComingSoonTab({ name, phase, features }) {
      return (
        <div className="flex flex-col items-center justify-center py-20 text-center">
          <p className="text-6xl mb-5">🚧</p>
          <p className="text-2xl font-bold text-gray-700">{name}</p>
          <p className="text-sm text-gray-400 mt-2">Phase {phase}에서 구현 예정</p>
          {features && (
            <ul className="mt-6 space-y-1.5 text-sm text-gray-500 text-left">
              {features.map((f, i) => <li key={i}>• {f}</li>)}
            </ul>
          )}
        </div>
      );
    }

    // ============================================================
    // APP ROOT
    // ============================================================
    const DATE_LABELS = {
      '1d':'오늘', '7d':'최근 7일', '30d':'최근 30일', '90d':'최근 90일', 'custom':'직접 설정'
    };

    function App() {
      const [tab, setTab]   = useState('overview');
      const [date, setDate] = useState('30d');

      const renderTab = () => {
        switch (tab) {
          case 'overview': return <OverviewTab />;
          case 'customer': return (
            <ComingSoonTab name="고객/RFM 분석" phase={2}
              features={['RFM 세그먼트 분포','고객 등급별 매출 기여도','이탈 위험 고객 리스트','LTV 분포','신규/휴면/복귀 고객 월별 추이']} />
          );
          case 'product': return (
            <ComingSoonTab name="상품/장바구니 분석" phase={3}
              features={['상품 검색 & 선택 패널','판매 추이 차트 (이중 Y축)','연관 구매 분석 (Basket Analysis)','전체 상품 랭킹 테이블','상품별 전환율 분석']} />
          );
          case 'cohort': return (
            <ComingSoonTab name="코호트 분석" phase={3}
              features={['첫 구매월 기준 재구매율 매트릭스','코호트별 누적 LTV','이탈 시점 분석']} />
          );
          case 'pattern': return (
            <ComingSoonTab name="구매 패턴 분석" phase={4}
              features={['요일별/시간대별 주문 히트맵','월별 계절성 분석','구매 주기 분포','첫 구매→재구매 전환 소요일 중앙값']} />
          );
        }
      };

      return (
        <div className="min-h-screen" style={{ backgroundColor:'#F5F5F5' }}>
          {/* ── Sticky Header ── */}
          <header className="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <div>
                  <h1 className="text-lg font-bold text-gray-900">🛒 Cafe24 데이터 분석 대시보드</h1>
                  <p className="text-xs text-gray-400 mt-0.5">
                    선택 기간: <strong className="text-gray-600">{DATE_LABELS[date]}</strong>
                    &nbsp;|&nbsp; 기준일: 2026-03-07
                  </p>
                </div>
                <DateFilterBar selected={date} onChange={setDate} />
              </div>
            </div>
          </header>

          {/* ── Sticky Tab Nav ── */}
          <div className="sticky bg-white shadow-sm" style={{ top:73, zIndex:10 }}>
            <div className="max-w-7xl mx-auto">
              <TabNav selected={tab} onChange={setTab} />
            </div>
          </div>

          {/* ── Content ── */}
          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
            {renderTab()}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
